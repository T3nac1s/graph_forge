name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          find src tests -type f \( -name '*.h' -o -name '*.hpp' -o -name '*.cpp' \) -print0 \
            | xargs -0 clang-format-18 --dry-run --Werror

      - name: Check CMake formatting
        run: |
          pip install --quiet cmakelang
          find . \( -name 'CMakeLists.txt' -o -path './cmake/*.cmake' \) -print \
            | xargs cmake-format --check

  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            generator: Ninja
            cxx: g++-14
            config: Release
          - os: ubuntu-24.04
            generator: Ninja
            cxx: clang++-18
            config: Release
          - os: macos-latest
            generator: Ninja
            cxx: clang++
            config: Release
          - os: windows-latest
            generator: Ninja
            cxx: cl
            config: Release

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-14 clang-18 lcov
          echo "CXX=${{ matrix.cxx }}" >> "$GITHUB_ENV"

      - name: Install toolchain (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja cmake

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          cmake -S . -B build
          -G "${{ matrix.generator }}"
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}
          -DCMAKE_CXX_STANDARD=20
          -DGRAPH_FORGE_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure

  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-14 clang-tidy-18

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          python3 .github/scripts/run_clang_tidy.py

  sanitizer:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-14

      - name: Configure with sanitizers
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build and test
        run: |
          cmake --build build
          ctest --test-dir build --output-on-failure

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-14 lcov

      - name: Configure with coverage
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DGRAPH_FORGE_ENABLE_COVERAGE=ON

      - name: Build and test
        run: |
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --ignore-errors mismatch,gcov,source,unused
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/_deps/*' \
            --output-file coverage.info \
            --ignore-errors unused
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.info
          fail_ci_if_error: false
